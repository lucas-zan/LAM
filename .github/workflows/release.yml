# Build unsigned macOS .dmg on semver tags (v1.2.3 or v1.2.3-rc.1).
# Optional signing: set repository secrets documented in docs/DESKTOP-RUNTIME.md
# or https://v2.tauri.app/distribute/sign/macos/

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_DIR: apps/desktop
  TAURI_DIR: apps/desktop/src-tauri

jobs:
  release-macos:
    name: macOS DMG (${{ github.ref_name }})
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag and resolve version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must be semver, e.g. v0.1.0 or v0.1.0-rc.1"
            exit 1
          fi
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Sync version from tag
        shell: bash
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const version = process.env.VERSION;
          const pkgPath = "apps/desktop/package.json";
          const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
          pkg.version = version;
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + "\n");
          NODE
          jq --arg v "$VERSION" '.version = $v' "$TAURI_DIR/tauri.conf.json" > /tmp/tauri.conf.json
          mv /tmp/tauri.conf.json "$TAURI_DIR/tauri.conf.json"
          sed -i '' "s/^version = \".*\"/version = \"${VERSION}\"/" "$TAURI_DIR/Cargo.toml"
          echo "Built as version ${VERSION}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.TAURI_DIR }}

      - name: Add macOS Rust targets (universal binary)
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Test (frontend + Rust)
        env:
          LAM_HOME: ${{ github.workspace }}/examples/fake-home
          LAM_ALLOW_FAKE_HOME: "1"
        run: |
          cd "$APP_DIR"
          npm run build
          npm run test:ui
          cd src-tauri
          cargo fmt -- --check
          cargo test

      - name: Build Tauri bundles and create GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment when Apple Developer signing secrets are configured:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        with:
          projectPath: ${{ env.APP_DIR }}
          tagName: ${{ github.ref_name }}
          releaseName: LAM v__VERSION__
          releaseBody: |
            macOS build for tag `${{ github.ref_name }}`.

            **Artifacts:** `.dmg` (universal: Apple Silicon + Intel) unless signing secrets are enabled in the repo.

            **Install:** open the DMG and drag LocalAgentManager to Applications. Unsigned builds may require *System Settings → Privacy & Security → Open Anyway* or right-click → Open.

            **Requires:** macOS, [Codex CLI](https://github.com/openai/codex) for full quota/session features. See [README](https://github.com/${{ github.repository }}#quick-start).
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          includeUpdaterJson: false
          args: --target universal-apple-darwin --bundles dmg
